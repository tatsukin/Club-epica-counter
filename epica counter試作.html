<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>クラブ人数カウンター</title>
  <!-- Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- React & ReactDOM (Production) -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <!-- Babel for inline JSX compilation -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="bg-gray-950 text-gray-100">
  <div id="root"></div>

  <script type="text/babel">
    const { useState } = React;

    // --- SVG型アイコンコンポーネント (外部依存を減らし高速動作) ---
    const IconMinus = () => (
      <svg className="w-4 h-4" fill="none" stroke="currentColor" strokeWidth="2.5" viewBox="0 0 24 24"><line x1="5" y1="12" x2="19" y2="12"></line></svg>
    );
    const IconPlus = () => (
      <svg className="w-4 h-4" fill="none" stroke="currentColor" strokeWidth="3" viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
    );
    const IconRotateCcw = () => (
      <svg className="w-6 h-6" fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"></path><path d="M3 3v5h5"></path></svg>
    );
    const IconClipboardList = () => (
      <svg className="w-5 h-5" fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24"><rect x="8" y="2" width="8" height="4" rx="1" ry="1"></rect><path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"></path><path d="M9 12h6"></path><path d="M9 16h6"></path></svg>
    );
    const IconCheck = () => (
      <svg className="w-4 h-4 text-green-400" fill="none" stroke="currentColor" strokeWidth="2.5" viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"></polyline></svg>
    );
    const IconTrash2 = () => (
      <svg className="w-6 h-6" fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path><line x1="10" y1="11" x2="10" y2="17"></line><line x1="14" y1="11" x2="14" y2="17"></line></svg>
    );
    const IconLogOut = () => (
      <svg className="w-7 h-7" fill="none" stroke="currentColor" strokeWidth="2.5" viewBox="0 0 24 24"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path><polyline points="16 17 21 12 16 7"></polyline><line x1="21" y1="12" x2="9" y2="12"></line></svg>
    );
    const IconCoins = () => (
      <svg className="w-5 h-5 text-yellow-600" fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24"><circle cx="8" cy="8" r="6"></circle><circle cx="18" cy="18" r="4"></circle><path d="M12 18a6 6 0 0 0-6-6"></path></svg>
    );
    const IconCalendarDays = () => (
      <svg className="w-3 h-3" fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect><line x1="16" y1="2" x2="16" y2="6"></line><line x1="8" y1="2" x2="8" y2="6"></line><line x1="3" y1="10" x2="21" y2="10"></line></svg>
    );
    const IconSettings = () => (
      <svg className="w-4 h-4" fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"></path></svg>
    );
    const IconSave = () => (
      <svg className="w-4 h-4" fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"></path><polyline points="17 21 17 13 7 13 7 21"></polyline><polyline points="7 3 7 8 15 8"></polyline></svg>
    );

    // --- データ定義（集計表に基づく分類） ---
    const CATEGORIES = [
      { id: 'normal', name: '一般', subTypes: [{ id: 'jp', name: '一般' }, { id: 'foreign', name: '外人' }] },
      { id: 'sns', name: '一般SNS', subTypes: [{ id: 'jp', name: '一般' }, { id: 'foreign', name: '外人' }] },
      { id: 'local', name: '地元', subTypes: [{ id: 'local', name: '地元' }, { id: 'foreign', name: '外人' }] },
      { id: 'local_sns', name: '地元SNS', subTypes: [{ id: 'local', name: '地元' }, { id: 'foreign', name: '外人' }] },
      { id: 'vip', name: 'VIP', subTypes: [{ id: 'jp', name: '一般' }, { id: 'local', name: '地元' }, { id: 'foreign', name: '外人' }] },
    ];

    // --- 料金・年齢設定 (初期値：平日 / 週末) ---
    const INITIAL_PATTERNS = {
      weekday: {
        id: 'weekday',
        label: '平日',
        ageInfo: '主な客層: 20代前半',
        prices: {
          normal: { jp: { M: 1500, F: 500 }, foreign: { M: 1500, F: 500 } },
          sns: { jp: { M: 1000, F: 0 }, foreign: { M: 1000, F: 0 } },
          local: { local: { M: 1000, F: 0 }, foreign: { M: 1500, F: 500 } },
          local_sns: { local: { M: 500, F: 0 }, foreign: { M: 1000, F: 0 } },
          vip: { jp: { M: 5000, F: 2000 }, local: { M: 4000, F: 2000 }, foreign: { M: 6000, F: 3000 } },
        }
      },
      weekend: {
        id: 'weekend',
        label: '祝前・週末',
        ageInfo: '主な客層: 20代後半〜',
        prices: {
          normal: { jp: { M: 3500, F: 1500 }, foreign: { M: 3500, F: 1500 } },
          sns: { jp: { M: 3000, F: 1000 }, foreign: { M: 3000, F: 1000 } },
          local: { local: { M: 2500, F: 1000 }, foreign: { M: 3500, F: 1500 } },
          local_sns: { local: { M: 2000, F: 500 }, foreign: { M: 3000, F: 1000 } },
          vip: { jp: { M: 10000, F: 3000 }, local: { M: 8000, F: 3000 }, foreign: { M: 12000, F: 5000 } },
        }
      }
    };

    function App() {
      const getInitialCounts = () => {
        const initial = {};
        CATEGORIES.forEach(cat => {
          cat.subTypes.forEach(sub => {
            initial[`${cat.id}_${sub.id}_M`] = 0; // 男
            initial[`${cat.id}_${sub.id}_F`] = 0; // 女
          });
        });
        return initial;
      };

      const [inCounts, setInCounts] = useState(getInitialCounts());
      const [outCount, setOutCount] = useState(0); // 退場総数
      
      const [mode, setMode] = useState('weekend'); // 平日・週末モード切替
      const [patterns, setPatterns] = useState(INITIAL_PATTERNS); // 料金パターンをステート管理
      const [showSettingsModal, setShowSettingsModal] = useState(false); // 料金編集モーダル
      const [tempPrices, setTempPrices] = useState(null); // 一時保存用
      
      const [reports, setReports] = useState([]);
      const [showResetModal, setShowResetModal] = useState(false);
      const [showReportModal, setShowReportModal] = useState(false);
      const [copied, setCopied] = useState(false);

      // --- 計算 ---
      const totalIn = Object.values(inCounts).reduce((sum, count) => sum + count, 0);
      const currentStay = Math.max(0, totalIn - outCount);
      const stayRatio = totalIn > 0 ? Math.round((currentStay / totalIn) * 100) : 0;

      // 合計金額計算 (編集された料金設定を適用)
      const currentPattern = patterns[mode];
      const totalRevenue = CATEGORIES.reduce((sum, cat) => {
        let catSum = 0;
        cat.subTypes.forEach(sub => {
          const countM = inCounts[`${cat.id}_${sub.id}_M`] || 0;
          const countF = inCounts[`${cat.id}_${sub.id}_F`] || 0;
          const priceM = currentPattern.prices[cat.id]?.[sub.id]?.M || 0;
          const priceF = currentPattern.prices[cat.id]?.[sub.id]?.F || 0;
          catSum += (countM * priceM) + (countF * priceF);
        });
        return sum + catSum;
      }, 0);

      // --- 操作ハンドラー ---
      const handleInIncrement = (key) => setInCounts(prev => ({ ...prev, [key]: prev[key] + 1 }));
      const handleInDecrement = (key) => setInCounts(prev => ({ ...prev, [key]: Math.max(0, prev[key] - 1) }));
      
      const handleOutIncrement = () => setOutCount(prev => prev + 1);
      const handleOutDecrement = () => setOutCount(prev => Math.max(0, prev - 1));

      const handleResetConfirm = () => {
        setInCounts(getInitialCounts());
        setOutCount(0);
        setShowResetModal(false);
      };

      // 料金設定の一時編集を開始
      const handleOpenSettings = () => {
        setTempPrices(JSON.parse(JSON.stringify(currentPattern.prices)));
        setShowSettingsModal(true);
      };

      // 料金設定の一時保存を適用
      const handleSaveSettings = () => {
        setPatterns(prev => ({
          ...prev,
          [mode]: {
            ...prev[mode],
            prices: tempPrices
          }
        }));
        setShowSettingsModal(false);
      };

      // 個別金額の入力ハンドラー
      const handlePriceChange = (catId, subId, gender, value) => {
        const numericValue = value === '' ? 0 : parseInt(value, 10);
        setTempPrices(prev => ({
          ...prev,
          [catId]: {
            ...prev[catId],
            [subId]: {
              ...prev[catId][subId],
              [gender]: isNaN(numericValue) ? 0 : numericValue
            }
          }
        }));
      };

      const handleCreateReport = () => {
        const now = new Date();
        const timeString = now.toLocaleTimeString('ja-JP', { hour: '2-digit', minute: '2-digit' });
        
        const lastReportOut = reports.length > 0 ? reports[0].totalOut : 0;
        const periodOut = outCount - lastReportOut;

        const newReport = {
          id: Date.now(),
          time: timeString,
          mode: currentPattern.label,
          data: { ...inCounts },
          totalIn,
          totalOut: outCount,
          periodOut,
          currentStay,
          stayRatio,
          revenue: totalRevenue
        };
        
        setReports([newReport, ...reports]);
        setShowReportModal(true);
      };

      const handleCopyReport = (report) => {
        const text = `【集計報告 ${report.time}】(${report.mode})\n` +
                     `・総入場者: ${report.totalIn}名\n` +
                     `・総退場者: ${report.totalOut}名 (当時間OUT: ${report.periodOut}名)\n` +
                     `・現在滞在: ${report.currentStay}名 (滞在率: ${report.stayRatio}%)\n` +
                     `・合計金額: ¥${report.revenue.toLocaleString()}\n`;
        
        const textArea = document.createElement("textarea");
        textArea.value = text;
        document.body.appendChild(textArea);
        textArea.select();
        try {
          document.execCommand('copy');
          setCopied(true);
          setTimeout(() => setCopied(false), 2000);
        } catch (err) {
          console.error('コピーに失敗', err);
        }
        document.body.removeChild(textArea);
      };

      // --- UIコンポーネント ---
      const CounterButton = ({ val, onDec, onInc, colorClass }) => (
        <div className="flex items-center gap-1 bg-gray-800 p-1 rounded-lg">
          <button onClick={onDec} className="p-2 bg-gray-700 hover:bg-gray-600 rounded text-gray-300">
            <IconMinus />
          </button>
          <div className={`w-8 text-center font-bold text-lg ${colorClass}`}>
            {val}
          </div>
          <button onClick={onInc} className={`p-2 rounded text-white flex-1 flex justify-center ${colorClass.replace('text-', 'bg-').replace('400', '600')} hover:opacity-80`}>
            <IconPlus />
          </button>
        </div>
      );

      return (
        <div className="min-h-screen bg-gray-950 text-gray-100 font-sans pb-40">
          
          {/* 画面上部：サマリーダッシュボード */}
          <header className="bg-gray-900 border-b border-gray-800 sticky top-0 z-10 shadow-lg">
            <div className="p-4 flex justify-between items-start">
              <div className="flex-1">
                <div className="flex items-center gap-3 mb-2">
                  <h1 className="text-xs text-gray-400 font-bold tracking-wider">CLUB COUNTER</h1>
                  {/* モード切替トグル */}
                  <button 
                    onClick={() => setMode(mode === 'weekend' ? 'weekday' : 'weekend')}
                    className={`flex items-center gap-1 text-[10px] font-bold px-2 py-1 rounded-full border transition-all ${
                      mode === 'weekend' ? 'bg-purple-900/50 border-purple-500 text-purple-300 shadow-[0_0_10px_rgba(168,85,247,0.3)]' : 'bg-blue-900/50 border-blue-500 text-blue-300 shadow-[0_0_10px_rgba(59,130,246,0.3)]'
                    }`}
                  >
                    <IconCalendarDays />
                    {currentPattern.label}
                  </button>
                  <span className="text-[10px] text-gray-500 hidden sm:inline">{currentPattern.ageInfo}</span>
                </div>
                <div className="grid grid-cols-2 gap-4">
                  <div>
                    <div className="text-gray-400 text-xs">総入場 (IN)</div>
                    <div className="text-3xl font-black text-emerald-400">{totalIn}</div>
                  </div>
                  <div>
                    <div className="text-gray-400 text-xs">合計金額</div>
                    <div className="text-2xl font-black text-yellow-400 mt-1 flex items-center gap-1">
                      <IconCoins />
                      ¥{totalRevenue.toLocaleString()}
                    </div>
                  </div>
                </div>
              </div>
              
              <div className="flex flex-col items-end gap-2">
                <div className="flex gap-2">
                  <button 
                    onClick={handleOpenSettings} 
                    className="bg-gray-800 text-gray-300 hover:text-white p-2.5 rounded-lg border border-gray-700 hover:bg-gray-700 transition-colors"
                    title="当日の料金設定をカスタム"
                  >
                    <IconSettings />
                  </button>
                  <button onClick={handleCreateReport} className="bg-indigo-600 text-white px-4 py-2 rounded-lg font-bold flex items-center gap-2 text-sm">
                    <IconClipboardList /> 途中報告
                  </button>
                </div>
                <div className="bg-gray-800 px-4 py-2 rounded-lg text-right w-full">
                  <div className="text-gray-400 text-[10px]">現在滞在 / 滞在率</div>
                  <div className="text-xl font-black text-white">
                    {currentStay} <span className="text-sm font-normal text-gray-400">名</span> / {stayRatio}<span className="text-sm font-normal text-gray-400">%</span>
                  </div>
                </div>
              </div>
            </div>
          </header>

          {/* メイン入力エリア：属性ごとのINカウンター */}
          <main className="p-2 space-y-4 max-w-3xl mx-auto mt-2">
            {CATEGORIES.map(category => (
              <div key={category.id} className="bg-gray-900/50 rounded-xl border border-gray-800 overflow-hidden">
                <div className="bg-gray-800 text-gray-200 font-bold px-3 py-2 text-sm border-b border-gray-700">
                  {category.name}
                </div>
                <div className="divide-y divide-gray-800/50">
                  {category.subTypes.map(subType => {
                    const keyM = `${category.id}_${subType.id}_M`;
                    const keyF = `${category.id}_${subType.id}_F`;
                    return (
                      <div key={subType.id} className="flex items-center p-2 gap-2">
                        <div className="w-16 text-sm text-gray-400 text-right pr-2">
                          {subType.name}
                        </div>
                        {/* 男カウンター */}
                        <div className="flex-1">
                          <div className="flex justify-between items-center mb-1 ml-1">
                            <span className="text-[10px] text-blue-400 font-bold">男</span>
                            <span className="text-[9px] text-gray-500 font-mono">¥{currentPattern.prices[category.id]?.[subType.id]?.M?.toLocaleString() || 0}</span>
                          </div>
                          <CounterButton 
                            val={inCounts[keyM]} 
                            onDec={() => handleInDecrement(keyM)} 
                            onInc={() => handleInIncrement(keyM)} 
                            colorClass="text-blue-400" 
                          />
                        </div>
                        {/* 女カウンター */}
                        <div className="flex-1">
                          <div className="flex justify-between items-center mb-1 ml-1">
                            <span className="text-[10px] text-pink-400 font-bold">女</span>
                            <span className="text-[9px] text-gray-500 font-mono">¥{currentPattern.prices[category.id]?.[subType.id]?.F?.toLocaleString() || 0}</span>
                          </div>
                          <CounterButton 
                            val={inCounts[keyF]} 
                            onDec={() => handleInDecrement(keyF)} 
                            onInc={() => handleInIncrement(keyF)} 
                            colorClass="text-pink-400" 
                          />
                        </div>
                      </div>
                    );
                  })}
                </div>
              </div>
            ))}
          </main>

          {/* 下部固定エリア：退場(OUT)専用ボタン ＆ リセット */}
          <div className="fixed bottom-0 left-0 right-0 bg-gray-900 border-t border-gray-800 p-4 shadow-[0_-10px_40px_rgba(0,0,0,0.5)] z-20 flex gap-4 items-center justify-between">
            <button onClick={() => setShowResetModal(true)} className="p-3 text-red-500 bg-red-500/10 rounded-full hover:bg-red-500/20">
              <IconRotateCcw />
            </button>

            <div className="flex-1 max-w-sm flex bg-gray-800 rounded-2xl p-1 border border-gray-700 items-center">
              <button onClick={handleOutDecrement} className="p-4 text-gray-400 hover:text-white">
                <IconMinus />
              </button>
              <div className="flex-1 flex flex-col items-center justify-center">
                <span className="text-orange-400 text-xs font-bold tracking-widest">退場 (OUT)</span>
                <span className="text-3xl font-black text-white">{outCount}</span>
              </div>
              <button 
                onClick={handleOutIncrement} 
                className="bg-orange-600 hover:bg-orange-500 text-white rounded-xl p-4 px-8 flex items-center justify-center shadow-lg active:scale-95 transition-transform"
              >
                <IconLogOut />
              </button>
            </div>
          </div>

          {/* 各種モーダル */}
          {/* リセット確認モーダル */}
          {showResetModal && (
            <div className="fixed inset-0 bg-black/80 flex items-center justify-center p-4 z-50 backdrop-blur-sm">
              <div className="bg-gray-900 border border-red-900 rounded-2xl p-6 w-full max-w-sm shadow-2xl">
                <h2 className="text-xl font-bold text-red-400 mb-2 flex items-center gap-2">
                  <IconTrash2 /> リセット確認
                </h2>
                <p className="text-gray-300 mb-6">入退場の全カウントをゼロに戻しますか？</p>
                <div className="flex gap-3">
                  <button onClick={() => setShowResetModal(false)} className="flex-1 bg-gray-800 text-white py-3 rounded-xl font-bold">キャンセル</button>
                  <button onClick={handleResetConfirm} className="flex-1 bg-red-600 text-white py-3 rounded-xl font-bold">リセット</button>
                </div>
              </div>
            </div>
          )}

          {/* 途中報告・レポートモーダル */}
          {showReportModal && (
            <div className="fixed inset-0 bg-black/80 flex items-center justify-center p-4 z-50 backdrop-blur-sm">
              <div className="bg-gray-900 border border-gray-700 rounded-2xl p-6 w-full max-w-sm shadow-2xl max-h-[80vh] flex flex-col">
                <div className="flex justify-between items-center mb-4">
                  <h2 className="text-xl font-bold text-white flex items-center gap-2">
                    <IconClipboardList /> 報告レポート
                  </h2>
                </div>
                
                <div className="overflow-y-auto flex-1 mb-4 space-y-3">
                  {reports.map((report) => (
                    <div key={report.id} className="bg-gray-800 p-4 rounded-xl border border-gray-700">
                      <div className="flex justify-between items-center mb-3 pb-2 border-b border-gray-700">
                        <span className="font-bold text-gray-300">{report.time} の集計 <span className="text-xs font-normal text-gray-500 ml-1">({report.mode})</span></span>
                        <button onClick={() => handleCopyReport(report)} className="text-sm bg-indigo-600 hover:bg-indigo-500 px-3 py-1 rounded flex items-center gap-1 text-white">
                          {copied ? <IconCheck /> : <IconClipboardList />} {copied ? 'コピー済' : 'コピー'}
                        </button>
                      </div>
                      <div className="grid grid-cols-2 gap-2 text-sm">
                        <div className="bg-gray-900 p-2 rounded col-span-2 flex justify-between items-center border border-yellow-900/30">
                          <div className="text-yellow-600 text-[10px] flex items-center gap-1"><IconCoins />合計金額</div>
                          <div className="text-yellow-400 font-bold text-lg">¥{report.revenue.toLocaleString()}</div>
                        </div>
                        <div className="bg-gray-900 p-2 rounded">
                          <div className="text-gray-500 text-[10px]">総入場</div>
                          <div className="text-emerald-400 font-bold text-lg">{report.totalIn}</div>
                        </div>
                        <div className="bg-gray-900 p-2 rounded">
                          <div className="text-gray-500 text-[10px]">現在滞在 (率)</div>
                          <div className="text-white font-bold text-lg">{report.currentStay} <span className="text-xs font-normal">({report.stayRatio}%)</span></div>
                        </div>
                        <div className="bg-gray-900 p-2 rounded">
                          <div className="text-gray-500 text-[10px]">総退場</div>
                          <div className="text-orange-400 font-bold text-lg">{report.totalOut}</div>
                        </div>
                        <div className="bg-gray-900 p-2 rounded border border-orange-900/50">
                          <div className="text-orange-300 text-[10px]">当時間OUT</div>
                          <div className="text-orange-400 font-bold text-lg">+{report.periodOut}</div>
                        </div>
                      </div>
                    </div>
                  ))}
                </div>
                
                <button onClick={() => setShowReportModal(false)} className="w-full bg-gray-700 text-white py-3 rounded-xl font-bold mt-auto">閉じる</button>
              </div>
            </div>
          )}

          {/* 料金カスタマイズ設定モーダル */}
          {showSettingsModal && tempPrices && (
            <div className="fixed inset-0 bg-black/90 flex items-center justify-center p-4 z-50 backdrop-blur-sm">
              <div className="bg-gray-900 border border-gray-700 rounded-2xl p-6 w-full max-w-lg shadow-2xl max-h-[85vh] flex flex-col">
                <div className="flex justify-between items-center mb-4">
                  <h2 className="text-lg font-bold text-white flex items-center gap-2">
                    <IconSettings />
                    {currentPattern.label}料金のカスタム設定
                  </h2>
                  <span className="text-xs text-amber-400 px-2 py-0.5 rounded bg-amber-950/50 border border-amber-900">
                    本日の料金変更（一時適用）
                  </span>
                </div>

                <p className="text-gray-400 text-xs mb-4">
                  イベント・ライブ等の特別料金、または最新の通常料金にこちらから上書きできます。変更すると画面の「合計金額」もリアルタイムに再計算されます。
                </p>

                <div className="overflow-y-auto flex-1 space-y-4 pr-1 mb-6">
                  {CATEGORIES.map(category => (
                    <div key={category.id} className="bg-gray-800/40 border border-gray-800 rounded-xl p-3">
                      <div className="text-sm font-bold text-gray-300 mb-2 border-b border-gray-700 pb-1">
                        {category.name}
                      </div>
                      <div className="space-y-3">
                        {category.subTypes.map(subType => (
                          <div key={subType.id} className="flex items-center gap-3">
                            <div className="w-20 text-xs text-gray-400">{subType.name}</div>
                            
                            {/* 男 料金設定 */}
                            <div className="flex-1 flex items-center gap-1.5">
                              <span className="text-[10px] text-blue-400">男:</span>
                              <input 
                                type="number"
                                value={tempPrices[category.id]?.[subType.id]?.M ?? 0}
                                onChange={(e) => handlePriceChange(category.id, subType.id, 'M', e.target.value)}
                                className="w-full bg-gray-900 border border-gray-700 rounded px-2 py-1 text-sm text-right text-blue-300 font-mono focus:border-blue-500 focus:outline-none"
                                placeholder="0"
                                min="0"
                              />
                            </div>

                            {/* 女 料金設定 */}
                            <div className="flex-1 flex items-center gap-1.5">
                              <span className="text-[10px] text-pink-400">女:</span>
                              <input 
                                type="number"
                                value={tempPrices[category.id]?.[subType.id]?.F ?? 0}
                                onChange={(e) => handlePriceChange(category.id, subType.id, 'F', e.target.value)}
                                className="w-full bg-gray-900 border border-gray-700 rounded px-2 py-1 text-sm text-right text-pink-300 font-mono focus:border-pink-500 focus:outline-none"
                                placeholder="0"
                                min="0"
                              />
                            </div>
                          </div>
                        ))}
                      </div>
                    </div>
                  ))}
                </div>

                <div className="flex gap-3">
                  <button 
                    onClick={() => setShowSettingsModal(false)} 
                    className="flex-1 bg-gray-800 hover:bg-gray-700 text-white py-3 rounded-xl font-bold text-sm transition-colors"
                  >
                    キャンセル
                  </button>
                  <button 
                    onClick={handleSaveSettings} 
                    className="flex-1 bg-indigo-600 hover:bg-indigo-500 text-white py-3 rounded-xl font-bold text-sm flex justify-center items-center gap-2 transition-colors"
                  >
                    <IconSave /> 設定を保存・適用
                  </button>
                </div>
              </div>
            </div>
          )}
        </div>
      );
    }

    const container = document.getElementById('root');
    const root = ReactDOM.createRoot(container);
    root.render(<App />);
  </script>
</body>
</html>
